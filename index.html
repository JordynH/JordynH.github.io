<!DOCTYPE html>
<html>
<head>
    <title>Jordyn Heil</title>
    <style>
        body {
            background: linear-gradient(to bottom, #2980b9, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .name-container {
            display: flex;
        }

        .name {
            font-size: 6rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation-name: fadeIn;
            animation-duration: 1s;
            animation-fill-mode: forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-100px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="name-container">
        <h1 class="name" style="animation-delay: 0s;">J</h1>
        <h1 class="name" style="animation-delay: 0.2s;">o</h1>
        <h1 class="name" style="animation-delay: 0.4s;">r</h1>
        <h1 class="name" style="animation-delay: 0.6s;">d</h1>
        <h1 class="name" style="animation-delay: 0.8s;">y</h1>
        <h1 class="name" style="animation-delay: 1s;">n</h1>
        <h1 class="name">&nbsp;</h1>
        <h1 class="name" style="animation-delay: 1.2s;">H</h1>
        <h1 class="name" style="animation-delay: 1.4s;">e</h1>
        <h1 class="name" style="animation-delay: 1.6s;">i</h1>
        <h1 class="name" style="animation-delay: 1.8s;">l</h1>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const names = document.querySelectorAll('.name');

            names.forEach(function(name) {
                name.style.opacity = 1;
            });
        });
    </script>
</body>
</html>
